name: Update Papers Daily

on:
  # Enable when you want scheduled refreshes.
  # schedule:
  #   - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-papers:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: dailypaper
          environment-file: environment.yml
          python-version: "3.10"
          auto-activate-base: false
          use-mamba: true
          channels: conda-forge,defaults

      - name: Verify environment
        shell: bash -el {0}
        run: |
          python -c "import yaml, arxiv, requests"

      - name: Fetch papers
        shell: bash -el {0}
        run: |
          python scripts/fetch_papers.py

      - name: Reindex papers
        shell: bash -el {0}
        run: |
          python scripts/reindex_papers.py

      - name: Generate HTML
        shell: bash -el {0}
        run: |
          python scripts/generate_html.py

      - name: Run tests
        shell: bash -el {0}
        run: |
          python -m unittest discover -s tests -v

      - name: Commit and push if changed
        shell: bash -el {0}
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/papers*.json
          if ! git diff --staged --quiet; then
            git commit -m "Auto update papers - $(date +'%Y-%m-%d')"
            git push
          else
            echo "No data changes to commit"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true
